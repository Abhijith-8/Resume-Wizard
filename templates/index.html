<!DOCTYPE html>
<html>
<head>
    <title>ResumeWizard</title>
</head>
<body>
    <h2>Upload Your Resume (PDF)</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="resume" accept=".pdf" required>
        <br><br>
        <button type="submit">Analyze Resume</button>
    </form>
</body>
</html>
